<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Primary SEO -->
<meta name="description" content="CurrencyandCurrents — Real-time Ghana finance and weather dashboard. Track GHS exchange rates, GSE stocks, crypto prices, fuel prices and local weather." />
<meta name="keywords" content="Ghana finance, GHS exchange rate, GSE stocks, Ghana weather, fuel prices Ghana, crypto Ghana, cedi rate" />
<meta name="author" content="CurrencyandCurrents" />
<meta name="robots" content="index, follow" />
<link rel="canonical" href="https://yourdomain.com" />

<!-- Open Graph (WhatsApp, Facebook previews) -->
<meta property="og:title" content="CurrencyandCurrents — Ghana Finance & Weather Dashboard" />
<meta property="og:description" content="Track GHS exchange rates, GSE stocks, crypto prices, fuel prices and local weather in real time." />
<meta property="og:image" content="https://yourdomain.com/assets/icons/ghana-flag.png" />
<meta property="og:url" content="https://yourdomain.com" />
<meta property="og:type" content="website" />

<!-- Twitter Card -->
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="CurrencyandCurrents — Ghana Finance & Weather Dashboard" />
<meta name="twitter:description" content="Real-time GHS rates, GSE stocks, crypto and fuel prices." />
<meta name="twitter:image" content="https://yourdomain.com/assets/icons/ghana-flag.png" />

<!-- Favicon -->
<link rel="icon" type="image/svg" href="assets/icons/Flag_of_Ghana.svg.webp" />
  
  <title>CurrencyandCurrents — Finance & Weather Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/responsive.css" />
</head>
<body>

  <!-- HEADER -->
  <header class="site-header">
    <div class="header-inner">
      <div class="logo">
       <img src="assets/icons/Flag_of_Ghana.svg.webp" alt="Ghana Flag" class="logo-flag-img" />

        <span class="logo-text">CurrencyandCurrents</span>
      </div>
      <div class="header-meta">
        <span id="current-time" class="time-display"></span>
        <span id="location-display" class="location-tag">📍 Accra, GH</span>
      </div>
    </div>
    <!-- scrolling ticker -->
    <div class="ticker-bar">
      <div class="ticker-track" id="ticker-track">
        <span class="ticker-loading">Loading market data...</span>
      </div>
    </div>
  </header>

  <!-- MAIN GRID -->
  <main class="dashboard-grid">

    <!-- WEATHER SECTION -->
    <section class="panel weather-panel" id="weather-section">
      <div class="panel-header">
        <h2 class="panel-title">Weather</h2>
        <button class="refresh-btn" data-target="weather">↻</button>
      </div>
      <div id="weather-widget" class="widget-content">
        <div class="skeleton-loader"></div>
      </div>
    </section>

    <!-- CURRENCY SECTION -->
    <section class="panel currency-panel" id="currency-section">
      <div class="panel-header">
        <h2 class="panel-title">FX Rates <span class="base-tag">GHS base</span></h2>
        <button class="refresh-btn" data-target="currency">↻</button>
      </div>
      <div id="currency-widget" class="widget-content">
        <div class="skeleton-loader"></div>
      </div>
    </section>

    <!-- GSE STOCKS SECTION -->
    <section class="panel stocks-panel" id="stocks-section">
      <div class="panel-header">
        <h2 class="panel-title">GSE Market</h2>
       
      </div>
      <div id="stocks-widget" class="widget-content">
        <div class="skeleton-loader"></div>
      </div>
    </section>

    <!-- CRYPTO SECTION -->
    <section class="panel crypto-panel" id="crypto-section">
      <div class="panel-header">
        <h2 class="panel-title">Crypto</h2>
        <button class="refresh-btn" data-target="crypto">↻</button>
      </div>
      <div id="crypto-widget" class="widget-content">
        <div class="skeleton-loader"></div>
      </div>
    </section>

    <!-- FUEL SECTION -->
    <section class="panel fuel-panel" id="fuel-section">
      <div class="panel-header">
        <h2 class="panel-title">Fuel Prices</h2>
        <span class="update-tag" id="fuel-updated"></span>
      </div>
      <div id="fuel-widget" class="widget-content">
        <div class="skeleton-loader"></div>
      </div>
    </section>

  </main>

  <footer class="site-footer">
    <p>Data is sourced from Open-Meteo · ExchangeRate-API · CoinGecko · NPA Ghana</p>
    <p class="footer-note">Rates are indicative. Not financial advice.</p>
  <p class="footer-copyright">
  &copy; <span id="footer-year"></span> GhanaFi. All rights reserved.
</p>
  </footer>

  <script type="module" src="js/app.js"></script>
</body>
</html>
