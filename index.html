<meta name="description" content="GTrics — Real-time Ghana finance and weather dashboard. Track GHS exchange rates, crypto prices, and local weather." />
<meta name="keywords" content="Ghana finance, GHS exchange rate, Ghana weather, crypto Ghana, cedi rate" />

<link rel="canonical" href="http://gtrics.live/" />

<!-- Open Graph (WhatsApp, Facebook previews) -->
<meta property="og:title" content="GTrics — Ghana Finance & Weather Dashboard" />

<!-- Twitter Card -->
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="GTrics — Ghana Finance & Weather Dashboard" />
<meta name="twitter:description" content="Real-time GHS exchange rates, crypto prices, and local weather updates." />
<meta name="twitter:image" content="https://gtrics.live/assets/icons/Flag_of_Ghana.svg.webp" />

<!-- Favicon -->
<link rel="icon" type="image/svg" href="assets/icons/Flag_of_Ghana.svg.webp" />
  <title>GTrics — Ghana Finance & Weather Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/responsive.css" />


<script async src="https://www.googletagmanager.com/gtag/js?id=G-ZD4Y9Z67SS"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-ZD4Y9Z67SS');
</script>

</head>
<body>

  <!-- HEADER -->
  <header class="site-header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-flag">🇬🇭</span>
        <span class="logo-text">GTrics</span>
      </div>
      <div class="header-meta">
        <span id="current-time" class="time-display"></span>
        <span id="location-display" class="location-tag">📍 Accra, GH</span>
      </div>
    </div>
    <div class="ticker-bar">
      <div class="ticker-track" id="ticker-track">
        <span class="ticker-loading">Loading market data...</span>
      </div>
    </div>
  </header>

  <!-- MAIN GRID -->
  <main class="dashboard-grid">

    <!-- WEATHER SECTION -->
    <section class="panel weather-panel" id="weather-section">
      <div class="panel-header">
        <h2 class="panel-title">Weather</h2>
        <button class="refresh-btn" data-target="weather">↻</button>
      </div>
      <div id="weather-widget" class="widget-content">
        <div class="skeleton-loader"></div>
      </div>
    </section>

    <!-- CURRENCY SECTION -->
    <section class="panel currency-panel" id="currency-section">
      <div class="panel-header">
        <h2 class="panel-title">FX Rates <span class="base-tag">GHS base</span></h2>
        <button class="refresh-btn" data-target="currency">↻</button>
      </div>
      <div id="currency-widget" class="widget-content">
        <div class="skeleton-loader"></div>
      </div>
    </section>

    <!-- CRYPTO SECTION -->
    <section class="panel crypto-panel" id="crypto-section">
      <div class="panel-header">
        <h2 class="panel-title">Crypto</h2>
        <button class="refresh-btn" data-target="crypto">↻</button>
      </div>
      <div id="crypto-widget" class="widget-content">
        <div class="skeleton-loader"></div>
      </div>
    </section>

  </main>

  <footer class="site-footer">
    <p>Data sourced from Open-Meteo · ExchangeRate-API · CoinGecko</p>
    <p class="footer-note">Rates are indicative. Not financial advice.</p>
    <p class="footer-copyright">&copy; <span id="footer-year"></span> GTrics. All rights reserved.</p>
  </footer>

  <script type="module" src="js/app.js"></script>
</body>
</html>
