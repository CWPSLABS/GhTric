# ============================================
# netlify.toml — Netlify configuration
# Place this at the ROOT of your project
# ============================================

[build]
  publish = "."          # Root folder is the site (no build step needed)
  functions = "netlify/functions"  # Where your serverless functions live

# Redirect all function calls cleanly
[[redirects]]
  from = "/api/currency"
  to = "/.netlify/functions/currency"
  status = 200

# Force HTTPS
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"